services:
  telegram-bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    network_mode: host          # para llegar al dashboard en localhost:8090
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}   # definido en .env (no versionado)
      - TZ=Europe/Madrid
      # Paperclip: coste/agentes/aprobaciones (todo en .env, no versionado)
      - PAPERCLIP_API_BASE=${PAPERCLIP_API_BASE:-http://100.72.30.94:3100}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY:-}
      - PAPERCLIP_COMPANY_ID=${PAPERCLIP_COMPANY_ID:-}
    volumes:
      - ./data:/data            # chat vinculado y estado de alertas
    labels:
      - com.centurylinklabs.watchtower.enable=false
