services:
  telegram-bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    network_mode: host          # para alcanzar vaultwarden/paperclip en localhost
    pid: host                   # métricas de procesos del host
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}   # definido en .env (no versionado)
      - TZ=Europe/Madrid
      - DIGEST_HOUR=${DIGEST_HOUR:-9}              # hora local del resumen diario
      - BASE_WATTS=8                               # consumo estimado placa+RAM+SSD (RAPL solo mide CPU)
      - PRICE_EUR_KWH=0.15                         # precio de la luz para estimar el coste
      # Paperclip: coste/agentes/aprobaciones (todo en .env, no versionado)
      - PAPERCLIP_API_BASE=${PAPERCLIP_API_BASE:-http://100.72.30.94:3100}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY:-}
      - PAPERCLIP_COMPANY_ID=${PAPERCLIP_COMPANY_ID:-}
    volumes:
      - ./data:/data                       # chat vinculado y estado de alertas
      - /proc:/host/proc:ro                # métricas de CPU/RAM del host
      - /sys:/host/sys:ro                  # sensores RAPL (consumo eléctrico)
      - /:/host/root:ro                    # uso de disco real de la raíz
      - /var/run/docker.sock:/var/run/docker.sock:ro   # estado de contenedores
    labels:
      - com.centurylinklabs.watchtower.enable=false
