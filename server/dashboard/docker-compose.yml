services:
  server-dashboard:
    build: .
    container_name: server-dashboard
    restart: unless-stopped
    network_mode: host          # necesario para leer contadores de red del host y llegar a vaultwarden en localhost
    pid: host                   # metricas de CPU/procesos del host
    environment:
      - TZ=Europe/Madrid
    volumes:
      - /proc:/host/proc:ro     # psutil lee el /proc del host
      - /:/host/root:ro         # uso de disco real de la raiz
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - com.centurylinklabs.watchtower.enable=false   # imagen local, watchtower no debe tocarla
